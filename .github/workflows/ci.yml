name: CI

# El robot valida cada Pull Request hacia main/develop y cada push a esas ramas.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Lint + Test + Build
    runs-on: ubuntu-latest

    # Variables ficticias: el pipeline no necesita una BD real para lint/test/build.
    # Las claves cumplen el formato exigido (64 hex) para que crypto/audit no fallen.
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/boveda?schema=public"
      JWT_SECRET: "ci-jwt-secret-suficientemente-largo-para-pruebas"
      MASTER_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      HMAC_SECRET: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"

    steps:
      # 1) Descargar el código
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 2) Instalar dependencias (reproducible con package-lock.json)
      - name: Instalar dependencias
        run: npm ci

      # Necesario: generar el cliente Prisma antes de compilar/typecheck.
      - name: Generar cliente Prisma
        run: npx prisma generate

      # 3) Comandos de verificación
      - name: Lint
        run: npm run lint

      - name: Pruebas unitarias
        run: npm test

      - name: Build de producción
        run: npm run build

  deploy:
    name: Desplegar a Railway (producción)
    needs: build-and-test
    # CD: sólo se dispara tras un push real a main (o sea, un PR ya mergeado),
    # nunca en un Pull Request abierto — así "aprobar y fusionar" es lo único
    # que activa el despliegue automático, sin intervención manual.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Desplegar (build remoto por Dockerfile + healthcheck + restart policy de railway.json)
        run: railway up --service web --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
